name: BMS Catalog Discovery (Full Probe)

# รันมือเท่านั้น
# mode=d0 → probe unchecked IDs ด้วย D0 (active bidding) — ขยาย catalog
# mode=w1 → probe ทุก ID ด้วย W1 (ประกาศผู้ชนะ) — หา target-area depts ย้อนหลัง

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Probe mode: d0 (catalog growth) หรือ w1 (target-area discovery)'
        required: false
        default: 'd0'
        type: choice
        options:
          - w1
          - d0
          - w0_full
  schedule:
    # ทุกวันพุธ 01:00 ICT (UTC+7) = ทุกวันอังคาร 18:00 UTC
    # probe D0 ครบ 9999 deptIds → จับหน่วยงานท้องถิ่นที่เพิ่งมีงานใหม่ภายใน 7 วัน
    - cron: '0 18 * * 2'

permissions:
  contents: write

jobs:
  probe-all:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Probe dept IDs
        run: |
          MODE="${{ github.event.inputs.mode || 'w1' }}"
          if [ "$MODE" = "w1" ]; then
            python scripts/Sebastian_RSS_Scraper.py --probe-w1
          elif [ "$MODE" = "w0_full" ]; then
            python scripts/Sebastian_RSS_Scraper.py --probe-w0-full
          else
            python scripts/Sebastian_RSS_Scraper.py --probe-all
          fi

      - name: Commit results
        if: always()
        run: |
          git config user.name  "Sebastian Bot"
          git config user.email "bot@bidmaster.local"
          git add data/egp_deptid_catalog.json || true
          git add data/target_deptids.json || true
          git add data/egp_w0_catalog.json || true
          git diff --staged --quiet || \
            git commit -m "chore: catalog probe [${{ github.event.inputs.mode || 'w1' }}] $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git push || true
