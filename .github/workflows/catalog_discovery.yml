name: BMS Catalog Discovery (Full Probe)

# mode=d0        → probe unchecked IDs ด้วย D0 — ขยาย catalog
# mode=w1        → probe ทุก ID ด้วย W0 — หา target-area depts ย้อนหลัง
# mode=w0_full   → probe W0 ทั้งหมด ไม่กรอง keyword → egp_w0_catalog.json
# mode=d0_repair → re-probe เฉพาะ IDs ที่โดน 429 ด้วย workers น้อยลง

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Probe mode'
        required: false
        default: 'd0'
        type: choice
        options:
          - d0
          - d0_repair
          - gentle_scan
          - w1
          - w0_full
  schedule:
    # ทุกวันพุธ 01:00 ICT (UTC+7) = ทุกวันอังคาร 18:00 UTC
    - cron: '0 18 * * 2'

permissions:
  contents: write

jobs:
  probe-all:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Probe dept IDs
        run: |
          MODE="${{ github.event.inputs.mode || 'd0' }}"
          if [ "$MODE" = "d0_repair" ]; then
            python scripts/Sebastian_RSS_Scraper.py --probe-429
          elif [ "$MODE" = "gentle_scan" ]; then
            python scripts/gentle_scan_egp.py --max-minutes 75
          elif [ "$MODE" = "w1" ]; then
            python scripts/Sebastian_RSS_Scraper.py --probe-w1
          elif [ "$MODE" = "w0_full" ]; then
            python scripts/Sebastian_RSS_Scraper.py --probe-w0-full
          else
            python scripts/Sebastian_RSS_Scraper.py --probe-all
          fi

      - name: Commit results
        if: always()
        run: |
          git config user.name  "Sebastian Bot"
          git config user.email "bot@bidmaster.local"
          git add data/egp_deptid_catalog.json || true
          git add data/target_deptids.json || true
          git add data/egp_w0_catalog.json || true
          git diff --staged --quiet || \
            git commit -m "chore: catalog probe [${{ github.event.inputs.mode || 'd0' }}] $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git push || true
