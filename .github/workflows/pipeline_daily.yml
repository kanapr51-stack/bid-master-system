name: BMS Daily Pipeline

on:
  schedule:
    - cron: '0 23 * * *'   # 06:00 Thailand (UTC+7) — หลัง cgd_discovery + winner_sweep 1 ชั่วโมง
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # ลดจาก 75 → 30 เพราะ CGD + winner_sweep ย้ายออกแล้ว

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline — refresh + classify + dashboard
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          DISCORD_BOT_TOKEN:           ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:          ${{ secrets.DISCORD_CHANNEL_ID }}
          LINE_CHANNEL_ACCESS_TOKEN:   ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID:               ${{ secrets.LINE_GROUP_ID }}
          SEBASTIAN_LINE_TOKEN:        ${{ secrets.SEBASTIAN_LINE_TOKEN }}
          SEBASTIAN_LINE_SECRET:       ${{ secrets.SEBASTIAN_LINE_SECRET }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          VERCEL_DASHBOARD_URL:        ${{ secrets.VERCEL_DASHBOARD_URL }}
          REVALIDATE_SECRET:           ${{ secrets.REVALIDATE_SECRET }}
        run: |
          set -e

          echo "=== Step 1: Refresh active + tor_review ==="
          # active+tor เต็ม เท่านั้น — pending ย้ายไป winner_sweep.yml แล้ว
          python scripts/refresh_active_jobs.py --expand --workers 5 --max-pending 0

          echo "=== Step 2: Enrich dept names ==="
          python scripts/enrich_dept_names.py --limit 50 || true

          echo "=== Step 3: Patch missing deadlines ==="
          python scripts/patch_deadlines.py || true

          echo "=== Step 4: Classify (rebuild derived sheets) ==="
          python scripts/Sebastian_Classifier.py

          echo "=== Step 5: Dashboard snapshot ==="
          python scripts/dashboard_extractor.py || true

      - name: Commit updated state files
        run: |
          git config user.name  "Sebastian Bot"
          git config user.email "bot@bidmaster.local"
          git pull --no-rebase origin main || true
          git add data/transitions_latest.json \
                  data/sheet_snapshot.json \
                  data/scrape_baseline.json \
                  data/refresh_pending_cursor.json \
                  data/rss_queue.json \
                  data/_discover_alljobs_cache.json \
                  data/egp_deptid_catalog.json || true
          git diff --staged --quiet || \
            git commit -m "chore: daily-pipeline state $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git push || true

      - name: LINE Notify — ส่งสรุปงานประจำวัน
        if: success()
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          LINE_CHANNEL_ACCESS_TOKEN:   ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID:               ${{ secrets.LINE_GROUP_ID }}
        run: python scripts/Sebastian_LINE_Notify.py || true

      - name: Health Check — deterministic
        if: success()
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DISCORD_BOT_TOKEN:           ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:          ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python scripts/sebastian_health_check.py || true

      - name: Discord — success report
        if: success()
        env:
          DISCORD_BOT_TOKEN:  ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          python -c "
          import sys, os, json
          sys.stdout.reconfigure(encoding='utf-8')
          sys.path.insert(0, 'scripts')
          from Sebastian_Discord_Notify import send
          token = os.environ['DISCORD_BOT_TOKEN']
          ch    = os.environ['DISCORD_CHANNEL_ID']
          try:
              snap = json.loads(open('data/sheet_snapshot.json', encoding='utf-8').read())
              from collections import Counter
              counts = Counter(snap.get('state', {}).values())
              stats = (f\"active={counts.get('active_bidding',0)} | \"
                       f\"pending={counts.get('pending_award',0)} | \"
                       f\"awarded={counts.get('awarded_jobs',0)}\")
          except Exception:
              stats = 'snapshot ไม่พร้อม'
          send(token, ch, f'✅ Daily Pipeline 06:00 — {stats}')
          " || true

      - name: Discord — failure alert
        if: failure()
        env:
          DISCORD_BOT_TOKEN:  ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          python -c "
          import sys, os; sys.path.insert(0, 'scripts')
          from Sebastian_Discord_Notify import send
          send(os.environ['DISCORD_BOT_TOKEN'], os.environ['DISCORD_CHANNEL_ID'],
               '❌ Daily Pipeline พัง — ตรวจ GHA log ด่วน https://github.com/kanapr51-stack/bid-master-system/actions')
          " || true
