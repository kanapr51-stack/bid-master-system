name: BMS Daily Pipeline

on:
  schedule:
    - cron: '0 23 * * *'   # 06:00 Thailand (UTC+7) = 23:00 UTC ของวันก่อน
  workflow_dispatch:        # รันมือได้จาก GitHub UI

permissions:
  contents: write           # สำหรับ commit state files กลับ

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline — refresh + patch + classify + notify
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          DISCORD_BOT_TOKEN:           ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:          ${{ secrets.DISCORD_CHANNEL_ID }}
          LINE_CHANNEL_ACCESS_TOKEN:   ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID:               ${{ secrets.LINE_GROUP_ID }}
          SEBASTIAN_LINE_TOKEN:        ${{ secrets.SEBASTIAN_LINE_TOKEN }}
          SEBASTIAN_LINE_SECRET:       ${{ secrets.SEBASTIAN_LINE_SECRET }}
          ANTHROPIC_API_KEY:           ${{ secrets.ANTHROPIC_API_KEY }}
          VERCEL_DASHBOARD_URL:        ${{ secrets.VERCEL_DASHBOARD_URL }}
          REVALIDATE_SECRET:           ${{ secrets.REVALIDATE_SECRET }}
          OPEND_USER_TOKEN:            ${{ secrets.OPEND_USER_TOKEN }}
        run: |
          set -e
          echo "=== Step 1: Refresh active jobs ==="
          # active+tor เต็ม + pending: งานประกาศ ≤30 วันเช็คทุกวัน (ช่วงลุ้นผู้ชนะ ~9 วัน)
          # + pending เก่าหมุนวน 1500/รอบ (เก็บตก) → กัน timeout แต่จับ winner เร็ว
          python scripts/refresh_active_jobs.py --expand --workers 5 --pending-recent-days 30 --max-pending 1500

          echo "=== Step 1.5: Winner Sweep (CGD batch + eGP rotation) ==="
          # Old pending (>30d): CGD province-batch ล้าง backlog + eGP rotation สำหรับ miss
          # Recent pending ครอบคลุมโดย Step 1 refresh แล้ว — ไม่ซ้ำ
          python scripts/winner_sweep.py --min-age-days 30 --max-cgd-calls 200 --max-egp 400 --workers 5 || true

          echo "=== Step 2: CGD Discovery (ทั้งประเทศ — ingest-once + filter-per-tenant) ==="
          # Province-batch download ทุกจังหวัด → delta vs all_jobs → append new awarded jobs + update winner_cache
          # early-stop: skip resource เมื่อ page เต็มไปด้วย seen IDs (ลด calls หลัง first run)
          # rotation cursor: quota หมดกลางคัน → ต่อพรุ่งนี้
          python scripts/cgd_discovery.py --provinces all --max-calls 600 || true

          echo "=== Step 3: Patch missing deadlines ==="
          python scripts/patch_deadlines.py || true

          echo "=== Step 4: Classify (rebuild derived sheets) ==="
          python scripts/Sebastian_Classifier.py

          echo "=== Step 5: LINE Notify (ปิดชั่วคราว — รอ province filter สำหรับ SaaS) ==="
          # python scripts/Sebastian_LINE_Notify.py || true

          echo "=== Step 6: Dashboard snapshot ==="
          python scripts/dashboard_extractor.py || true

      - name: Commit updated state files
        run: |
          git config user.name  "Sebastian Bot"
          git config user.email "bot@bidmaster.local"
          git add data/winner_cache_bootstrap.json \
                  data/transitions_latest.json \
                  data/sheet_snapshot.json \
                  data/scrape_baseline.json \
                  data/refresh_pending_cursor.json \
                  data/winner_sweep_cursor.json \
                  data/cgd_discovery_seen.json || true
          git diff --staged --quiet || \
            git commit -m "chore: auto-update state files $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git push || true
