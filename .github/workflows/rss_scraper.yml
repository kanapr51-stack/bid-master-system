name: BMS RSS Scraper

on:
  schedule:
    - cron: '22 * * * *'   # ทุกชั่วโมงที่ :22 — rotate poll (57 active depts)
    - cron: '52 * * * *'   # ทุกชั่วโมงที่ :52 — rotate poll
    - cron: '0 20 * * *'   # ทุกวัน 03:00 ICT — full_poll (negative cache ~2 min)
  workflow_dispatch:
    inputs:
      full_poll:
        description: 'Poll ทุก 9999 หน่วยงาน (ทั้งประเทศ)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  rss:
    runs-on: ubuntu-latest
    # full-poll: 9999 depts × ~3s avg / 8 workers ≈ 60 min → ขยาย timeout
    # rotate: 35 min เหมือนเดิม
    timeout-minutes: ${{ inputs.full_poll && 90 || 35 }}

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSS Scraper
        timeout-minutes: ${{ inputs.full_poll && 75 || 15 }}
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          DISCORD_BOT_TOKEN:           ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:          ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          IS_FULL_POLL="${{ inputs.full_poll }}"
          # cron ตี 3 ICT (20:00 UTC) = full_poll อัตโนมัติ
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 20 * * *" ]; then
            IS_FULL_POLL="true"
          fi
          if [ "$IS_FULL_POLL" = "true" ]; then
            python scripts/Sebastian_RSS_Scraper.py --stage D0 --full-poll --no-probe --queue || true
          else
            python scripts/Sebastian_RSS_Scraper.py --stage rotate --queue || true
          fi

      # Commit catalog EARLY (กัน catalog หายถ้า step ถัดไป cancelled)
      - name: Commit catalog + RSS state (early checkpoint)
        if: always()  # commit แม้ step ก่อนหน้า fail/timeout
        run: |
          git config user.name  "Sebastian Bot"
          git config user.email "bot@bidmaster.local"
          git add data/rss_queue.json \
                  data/rss_seen_ids.json \
                  data/rss_stage_rotation.json \
                  data/egp_deptid_catalog.json || true
          git diff --staged --quiet || \
            git commit -m "chore: rss catalog $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git push || true

      - name: Process RSS queue (refresh from-queue)
        timeout-minutes: 15
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          DISCORD_BOT_TOKEN:           ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:          ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          python scripts/refresh_active_jobs.py --from-queue --workers 5 || true

      - name: Commit winner cache
        if: always()
        run: |
          git config user.name  "Sebastian Bot"
          git config user.email "bot@bidmaster.local"
          git add data/winner_cache_bootstrap.json || true
          git diff --staged --quiet || \
            git commit -m "chore: winner cache $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git push || true
