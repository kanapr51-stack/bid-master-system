name: BMS RSS Scraper

on:
  schedule:
    - cron: '22 * * * *'   # ทุกชั่วโมงที่ :22
    - cron: '52 * * * *'   # ทุกชั่วโมงที่ :52
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rss:
    runs-on: ubuntu-latest
    timeout-minutes: 40   # split per-dept 1×10 → 3×8 step = 24 min + global 3 + commit 1 + queue 10 = ~38 + buffer

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Global RSS poll (D0+P0+W0+B0 all-Thailand)
        timeout-minutes: 3
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          DISCORD_BOT_TOKEN:           ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:          ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          python scripts/Sebastian_RSS_Scraper.py --global --queue || true
          python scripts/Sebastian_RSS_Scraper.py --stage B0 --global --queue || true

      # Split per-dept poll เป็น 3 steps — แต่ละ stage budget แยก ถ้า P0 ห่วยก็ไม่กระทบ D0/B0
      - name: Per-dept RSS poll [D0]
        timeout-minutes: 8
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          DISCORD_BOT_TOKEN:           ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:          ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python scripts/Sebastian_RSS_Scraper.py --stage D0 --full-poll --no-probe --queue

      - name: Per-dept RSS poll [B0]
        timeout-minutes: 8
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          DISCORD_BOT_TOKEN:           ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:          ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python scripts/Sebastian_RSS_Scraper.py --stage B0 --full-poll --no-probe --queue

      - name: Per-dept RSS poll [P0]
        timeout-minutes: 8
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          DISCORD_BOT_TOKEN:           ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:          ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python scripts/Sebastian_RSS_Scraper.py --stage P0 --full-poll --no-probe --queue

      - name: Commit catalog + RSS state
        if: always()
        run: |
          git config user.name  "Sebastian Bot"
          git config user.email "bot@bidmaster.local"
          git add data/rss_queue.json \
                  data/rss_seen_ids.json \
                  data/rss_stage_rotation.json \
                  data/egp_deptid_catalog.json || true
          git diff --staged --quiet || \
            git commit -m "chore: rss catalog $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git push || true

      - name: Process RSS queue
        timeout-minutes: 10
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          DISCORD_BOT_TOKEN:           ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID:          ${{ secrets.DISCORD_CHANNEL_ID }}
        run: |
          python scripts/refresh_active_jobs.py --from-queue --workers 5 || true

      - name: Commit winner cache
        if: always()
        run: |
          git config user.name  "Sebastian Bot"
          git config user.email "bot@bidmaster.local"
          git add data/winner_cache_bootstrap.json || true
          git diff --staged --quiet || \
            git commit -m "chore: winner cache $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git push || true
